unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
# allow to send prefix to nested tmux with C-b
bind-key -n C-b send-prefix

set-window-option -g mode-keys vi

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
# automatically renumber windows when somee are closed
set -g renumber-windows on
# changing window order
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1
set -g history-limit 100000

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind r source-file ~/.tmux.conf
bind P paste-buffer

# Undercurl
# set -g default-terminal "${TERM}"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

set -g mouse on
set-option -g status-position top
set-option -g focus-events on # allows to toggle line numbers in vim

set -g set-clipboard on
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe'

# if-shell 'test ! -z `which powerline-daemon`' 'run-shell "powerline-daemon -q --replace"'
# if-shell 'test ! -z `which powerline-config`' 'run-shell "powerline-config tmux setup"'

# allow nested tmux sessions
bind -T root F12  \
     if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
     set prefix None \;\
     set key-table off \;\
     set status off \;\
     refresh-client -S \;\

 bind -T off F12 \
     set -u prefix \;\
     set -u key-table \;\
     set status on \;\
     refresh-client -S \;\

set -g @fingers-key f
set -g @fingers-jump-key C-f
set -g @fingers-pattern-0 'test_.+::[^\s]+'
set -g @fingers-pattern-1 'sha256:[0-9a-fA-F]{64}'
set -g @fingers-pattern-2 '[0-9a-fA-F]{64}'
set -g @fingers-ctrl-action "xargs -I {} tmux run-shell 'cd #{pane_current_path}; ~/.tmux/plugins/tmux-open-nvim/scripts/ton {} > ~/.tmux/plugins/tmux-open-nvim/ton.log'"s

# nvim
set -g @ton-prioritize-window true
set -g @ton-open-strategy ":tabnew"

# cliboard doesnt seem to work
# also doesnt support alt-action to directly paste
set -g @thumbs-key f
set -g @thumbs-osc52 1
set -g @thumbs-regexp-0 'test_.+::[^\s]+'
set -g @thumbs-regexp-1 'sha256:[0-9a-fA-F]{64}'
set -g @thumbs-regexp-2 '[0-9a-fA-F]{64}'

set -g @powerkit_status_interval "2"
set -g @powerkit_elements_spacing "false"
set -g @powerkit_edge_separator_style "normal"
set -g @powerkit_theme "ristretto"
set -g @powerkit_theme_variant "default"
set -g @powerkit_plugins "group(cpu,memory,swap),group(datetime,hostname)"
set -g @powerkit_plugin_memory_format "percentage"
set -g @powerkit_plugin_datetime_format "%Y-%m-%d %H:%M"

TMUX_FZF_LAUNCH_KEY="M-f"
bind-key "C-s" run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/session.sh switch"
bind-key "C-w" run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/window.sh switch"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'brennanfee/tmux-paste'
set -g @plugin 'tmux-plugins/tmux-pain-control'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'Morantron/tmux-fingers'
# set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'fabioluciano/tmux-powerkit'
# set -g @plugin 'erikw/tmux-powerline'
set -g @plugin 'trevarj/tmux-open-nvim'

run '~/.tmux/plugins/tpm/tpm'

# resources
# https://dev.to/iggredible/useful-tmux-configuration-examples-k3g
# https://github.com/samoshkin/tmux-config
